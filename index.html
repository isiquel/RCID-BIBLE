<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCID BIBLE | Ministerial Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0b0d;
            --glass: rgba(255, 255, 255, 0.08);
            --gold: #c5a059;
            --gold-light: #e2c285;
            --text: #e0e0e0;
            --danger: #ff4d4d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: 0.2s; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Menu Superior */
        .nav-header { background: #0f1014; border-bottom: 1px solid var(--glass); padding: 10px 5px; }
        .nav-tabs { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; max-width: 950px; margin: 0 auto; }
        .tab-btn {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1); color: var(--text);
            padding: 10px 1px; border-radius: 8px; font-size: 8px; font-weight: 600; text-transform: uppercase; text-align: center; cursor: pointer;
        }
        .tab-btn.active { background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: #000; }

        .content-wrapper { flex: 1; position: relative; overflow: hidden; }
        .view-section { position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 20px; display: none; flex-direction: column; overflow-y: auto; }
        .view-section.active { display: flex; }

        /* Esboços - Estilos */
        .sermon-item { 
            background: var(--glass); padding: 15px; border-radius: 12px; margin-bottom: 10px; 
            display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--gold);
        }
        .delete-btn { color: var(--danger); font-weight: bold; padding: 5px 10px; cursor: pointer; font-size: 14px; }
        
        /* Overlay de Leitura do Esboço (Tela Cheia) */
        #readingOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); z-index: 2000; padding: 30px 20px; overflow-y: auto;
        }
        .reading-title { color: var(--gold); font-size: 24px; margin-bottom: 20px; border-bottom: 1px solid var(--gold); padding-bottom: 10px; }
        .reading-body { font-size: 18px; line-height: 1.8; white-space: pre-wrap; color: #fff; padding-bottom: 80px; }

        /* Bíblia */
        .swipe-guide { 
            text-align: center; font-size: 10px; color: var(--gold); 
            margin: 10px 0; opacity: 0.7; letter-spacing: 1px; font-weight: 600;
        }
        .verse-line { margin-bottom: 12px; padding: 10px; border-radius: 10px; line-height: 1.8; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .v-num { color: var(--gold); font-weight: bold; margin-right: 12px; }

        .card { background: var(--glass); padding: 20px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 15px; }
        select, input, textarea { width: 100%; background: #15161a; border: 1px solid rgba(255,255,255,0.1); color: white; padding: 15px; border-radius: 14px; margin-bottom: 15px; font-size: 16px; outline: none; }
        
        .action-btn { width: 100%; background: linear-gradient(135deg, var(--gold), var(--gold-light)); border: none; padding: 16px; border-radius: 14px; font-weight: bold; cursor: pointer; color: #000; text-transform: uppercase; }

        .progress-bar { height: 100%; background: var(--gold); width: 0%; transition: width 0.8s; }
        .progress-container { background: rgba(255,255,255,0.05); border-radius: 10px; height: 6px; margin-bottom: 5px; overflow: hidden; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
    </style>
</head>
<body>

    <header class="nav-header">
        <div class="nav-tabs">
            <button class="tab-btn active" onclick="switchView('home')">Busca</button>
            <button class="tab-btn" onclick="switchView('leitura')">Bíblia</button>
            <button class="tab-btn" onclick="switchView('esboços')">Esboços</button>
            <button class="tab-btn" onclick="switchView('dicionario')">Dicio</button>
            <button class="tab-btn" onclick="switchView('estudos')">Religião</button>
            <button class="tab-btn" onclick="switchView('biblioteca')">Livros</button>
        </div>
    </header>

    <main class="content-wrapper">
        <section id="view-home" class="view-section active">
            <h1 style="text-align:center; font-weight:800; color:var(--gold); margin-bottom:20px;">RCID BIBLE</h1>
            <div class="card">
                <select id="bookSelect">
                    <option value="Gênesis">Gênesis</option><option value="Êxodo">Êxodo</option><option value="Levítico">Levítico</option><option value="Números">Números</option><option value="Deuteronômio">Deuteronômio</option><option value="Josué">Josué</option><option value="Juízes">Juízes</option><option value="Rute">Rute</option><option value="1 Samuel">1 Samuel</option><option value="2 Samuel">2 Samuel</option><option value="1 Reis">1 Reis</option><option value="2 Reis">2 Reis</option><option value="1 Crônicas">1 Crônicas</option><option value="2 Crônicas">2 Crônicas</option><option value="Esdras">Esdras</option><option value="Neemias">Neemias</option><option value="Ester">Ester</option><option value="Jó">Jó</option><option value="Salmos">Salmos</option><option value="Provérbios">Provérbios</option><option value="Eclesiastes">Eclesiastes</option><option value="Cantares">Cantares</option><option value="Isaías">Isaías</option><option value="Jeremias">Jeremias</option><option value="Lamentações">Lamentações</option><option value="Ezequiel">Ezequiel</option><option value="Daniel">Daniel</option><option value="Oséias">Oséias</option><option value="Joel">Joel</option><option value="Amós">Amós</option><option value="Obadias">Obadias</option><option value="Jonas">Jonas</option><option value="Miquéias">Miquéias</option><option value="Naum">Naum</option><option value="Habacuque">Habacuque</option><option value="Sofonias">Sofonias</option><option value="Ageu">Ageu</option><option value="Zacarias">Zacarias</option><option value="Malaquias">Malaquias</option><option value="Mateus">Mateus</option><option value="Marcos">Marcos</option><option value="Lucas">Lucas</option><option value="João">João</option><option value="Atos">Atos</option><option value="Romanos">Romanos</option><option value="1 Coríntios">1 Coríntios</option><option value="2 Coríntios">2 Coríntios</option><option value="Gálatas">Gálatas</option><option value="Efésios">Efésios</option><option value="Filipenses">Filipenses</option><option value="Colossenses">Colossenses</option><option value="1 Tessalonicenses">1 Tessalonicenses</option><option value="2 Tessalonicenses">2 Tessalonicenses</option><option value="1 Timóteo">1 Timóteo</option><option value="2 Timóteo">2 Timóteo</option><option value="Tito">Tito</option><option value="Filemom">Filemom</option><option value="Hebreus">Hebreus</option><option value="Tiago">Tiago</option><option value="1 Pedro">1 Pedro</option><option value="2 Pedro">2 Pedro</option><option value="1 João">1 João</option><option value="2 João">2 João</option><option value="3 João">3 João</option><option value="Judas">Judas</option><option value="Apocalipse">Apocalipse</option>
                </select>
                <input type="number" id="capInput" value="1" min="1">
                <button class="action-btn" onclick="getBible()">ABRIR BÍBLIA</button>
            </div>
            <button class="action-btn" style="background:#009ee3; color:white; font-size:12px;" onclick="window.open('https://mpago.la/126sWfx', '_blank')">OFERTAR VIA MERCADO PAGO</button>
        </section>

        <section id="view-leitura" class="view-section">
            <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
            <div class="swipe-guide">← ARRASTE PARA MUDAR DE CAPÍTULO →</div>
            <div id="bibleContent"></div>
        </section>

        <section id="view-esboços" class="view-section">
            <input type="text" id="sermonTitle" placeholder="Título da Pregação">
            <textarea id="sermonText" style="height: 150px;" placeholder="Conteúdo do esboço..."></textarea>
            <button class="action-btn" onclick="saveSermon()">SALVAR NOVO ESBOÇO</button>
            
            <div id="sermonList" style="margin-top: 20px;">
                <h3 style="font-size: 14px; color: var(--gold); margin-bottom: 10px;">MEUS SERMÕES SALVOS</h3>
            </div>
        </section>

        <section id="view-dicionario" class="view-section">
            <input type="text" id="dicInput" placeholder="Termo teológico...">
            <button class="action-btn" onclick="searchDic()">PESQUISAR DICIONÁRIO</button>
        </section>

        <section id="view-estudos" class="view-section">
            <input type="text" id="apoInput" placeholder="Seita ou tema polêmico...">
            <button class="action-btn" style="background:#1e3c72; color:white;" onclick="searchApo()">PESQUISAR NO CACP</button>
        </section>

        <section id="view-biblioteca" class="view-section">
            <input type="text" id="libInput" placeholder="Livros no Telegram...">
            <button class="action-btn" style="background:#0088cc; color:white;" onclick="searchLibrary()">ABRIR BIBLIOTECA</button>
        </section>
    </main>

    <div id="readingOverlay">
        <button onclick="closeReading()" style="background:var(--gold); color:#000; border:none; padding:10px 20px; border-radius:10px; font-weight:bold; margin-bottom:20px; float:right;">FECHAR</button>
        <div id="readingContent">
            <h2 class="reading-title" id="readTitle">Título</h2>
            <div class="reading-body" id="readBody">Corpo do sermão...</div>
        </div>
    </div>

    <script>
        let touchstartX = 0;
        let touchendX = 0;

        window.onload = () => {
            renderSermons();
            updateProgressBar();
        };

        function switchView(id) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            const map = { 'home':0, 'leitura':1, 'esboços':2, 'dicionario':3, 'estudos':4, 'biblioteca':5 };
            document.querySelectorAll('.tab-btn')[map[id]].classList.add('active');
        }

        async function getBible() {
            const book = document.getElementById('bookSelect').value;
            const cap = document.getElementById('capInput').value;
            const output = document.getElementById('bibleContent');
            output.innerHTML = "<p style='text-align:center; color:var(--gold);'>Carregando...</p>";
            switchView('leitura');
            try {
                const res = await fetch(`https://bible-api.com/${encodeURIComponent(book)} ${cap}?translation=almeida`);
                const data = await res.json();
                let html = `<h2 style="color:var(--gold); margin-bottom:15px; border-left:3px solid var(--gold); padding-left:10px;">${data.reference}</h2>`;
                data.verses.forEach(v => {
                    html += `<div class="verse-line"><span class="v-num">${v.verse}</span><span>${v.text}</span></div>`;
                });
                output.innerHTML = html;
                updateProgressBar();
                document.getElementById('view-leitura').scrollTop = 0;
            } catch(e) { console.error(e); }
        }

        // Swipe na Bíblia
        const bibleArea = document.getElementById('view-leitura');
        bibleArea.addEventListener('touchstart', e => { touchstartX = e.changedTouches[0].screenX; });
        bibleArea.addEventListener('touchend', e => { 
            touchendX = e.changedTouches[0].screenX;
            if (touchendX < touchstartX - 100) { document.getElementById('capInput').value++; getBible(); }
            if (touchendX > touchstartX + 100) { let v = document.getElementById('capInput').value; if(v>1) { document.getElementById('capInput').value--; getBible(); } }
        });

        // Gerenciador de Esboços
        function saveSermon() {
            const title = document.getElementById('sermonTitle').value || "Sermão " + new Date().toLocaleDateString();
            const text = document.getElementById('sermonText').value;
            if(!text) return alert("Escreva algo no esboço!");
            let sermons = JSON.parse(localStorage.getItem('rcid_sermons_list') || "[]");
            sermons.push({ id: Date.now(), title, text });
            localStorage.setItem('rcid_sermons_list', JSON.stringify(sermons));
            document.getElementById('sermonTitle').value = "";
            document.getElementById('sermonText').value = "";
            renderSermons();
        }

        function renderSermons() {
            const listArea = document.getElementById('sermonList');
            let sermons = JSON.parse(localStorage.getItem('rcid_sermons_list') || "[]");
            listArea.innerHTML = '<h3 style="font-size: 14px; color: var(--gold); margin-bottom: 10px;">MEUS SERMÕES SALVOS</h3>';
            sermons.forEach((s) => {
                const div = document.createElement('div');
                div.className = 'sermon-item';
                div.innerHTML = `
                    <span onclick="openReading(${s.id})" style="flex:1;">${s.title}</span>
                    <span class="delete-btn" onclick="deleteSermon(${s.id})">EXCLUIR</span>
                `;
                listArea.appendChild(div);
            });
        }

        function deleteSermon(id) {
            if(confirm("Deseja realmente excluir este esboço?")) {
                let sermons = JSON.parse(localStorage.getItem('rcid_sermons_list') || "[]");
                sermons = sermons.filter(s => s.id !== id);
                localStorage.setItem('rcid_sermons_list', JSON.stringify(sermons));
                renderSermons();
            }
        }

        function openReading(id) {
            let sermons = JSON.parse(localStorage.getItem('rcid_sermons_list') || "[]");
            let s = sermons.find(item => item.id === id);
            document.getElementById('readTitle').innerText = s.title;
            document.getElementById('readBody').innerText = s.text;
            document.getElementById('readingOverlay').style.display = 'block';
        }

        function closeReading() { document.getElementById('readingOverlay').style.display = 'none'; }

        function updateProgressBar() {
            let perc = (document.getElementById('capInput').value / 50 * 100);
            document.getElementById('progressBar').style.width = Math.min(perc, 100) + "%";
        }

        function searchDic() { window.open(`https://casadosenhor.com.br/dicionario/?s=${encodeURIComponent(document.getElementById('dicInput').value)}`, '_blank'); }
        function searchApo() { window.open(`https://www.cacp.app.br/?s=${encodeURIComponent(document.getElementById('apoInput').value)}`, '_blank'); }
        function searchLibrary() { window.open(`https://t.me/s/livrosgratuitos?q=${encodeURIComponent(document.getElementById('libInput').value)}`, '_blank'); }
    </script>
</body>
</html>
